<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>R-R Program</title>
    <meta name="description" content="Returns & Refunds Program" />
    <style>
      :root { color-scheme: light dark; --bg: #0b0b0c; --fg: #e8e8ea; --muted: #9a9aa0; --accent: #4f8cff; --card: #151518; --ok: #24d17c; --bad: #ff6464; }
      @media (prefers-color-scheme: light) { :root { --bg: #f7f7f9; --fg: #0f1115; --muted: #5b5b66; --accent: #2b6fff; --card: #ffffff; } }
      * { box-sizing: border-box }
      body { margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, Apple Color Emoji, Segoe UI Emoji; background: var(--bg); color: var(--fg); }
      header { max-width: 980px; margin: 24px auto 8px; padding: 0 16px; display: flex; align-items: center; justify-content: space-between }
      .brand { font-weight: 700; letter-spacing: 0.3px }
      .card { background: var(--card); border: 1px solid rgba(128,128,128,.2); border-radius: 12px; padding: 16px }
      main { max-width: 980px; margin: 0 auto; padding: 16px; display: grid; gap: 16px; grid-template-columns: repeat(12, 1fr) }
      .col-6 { grid-column: span 6 }
      .col-12 { grid-column: span 12 }
      label { display:block; font-size: 12px; color: var(--muted); margin-bottom: 6px }
      input, select { width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid rgba(128,128,128,.3); background: transparent; color: inherit }
      input[type="date"] { padding: 8px 10px }
      .row { display:grid; grid-template-columns: repeat(12,1fr); gap: 12px }
      .btn { appearance:none; border:0; border-radius: 12px; background: var(--accent); color: white; padding: 10px 14px; font-weight: 600; cursor: pointer }
      .btn.secondary { background: transparent; color: var(--accent); border: 1px solid var(--accent) }
      .stack { display:flex; gap: 8px; align-items: center }
      .muted { color: var(--muted) }
      .pill { display:inline-block; padding: 6px 10px; border-radius: 999px; font-size: 12px; background: rgba(128,128,128,.15) }
      .ok { color: var(--ok) }
      .bad { color: var(--bad) }
      table { width: 100%; border-collapse: collapse }
      th, td { padding: 8px 8px; border-bottom: 1px solid rgba(128,128,128,.2) }
      .grid-2 { display:grid; grid-template-columns: 1fr 1fr; gap: 12px }
      footer { max-width: 980px; margin: 8px auto 48px; padding: 0 16px; color: var(--muted); font-size: 12px }
    </style>
  </head>
  <body>
    <header>
      <div class="brand">Returns & Refunds</div>
      <div class="stack">
        <button id="refresh" class="btn secondary">Refresh</button>
        <a class="pill muted" href="https://example.com/docs" target="_blank" rel="noreferrer">Docs</a>
      </div>
    </header>
    <main>
      <section class="col-6 card">
        <h3 class="stack" style="margin:0 0 8px 0">Check eligibility <span class="pill">Policy-driven</span></h3>
        <div class="grid-2">
          <div>
            <label>Purchase date</label>
            <input id="purchasedAt" type="date" />
          </div>
          <div>
            <label>Price paid (cents)</label>
            <input id="pricePaidCents" type="number" placeholder="9999" />
          </div>
          <div>
            <label>Clearance item?</label>
            <select id="isClearance"><option value="false">No</option><option value="true">Yes</option></select>
          </div>
          <div>
            <label>Opened?</label>
            <select id="isOpened"><option value="false">No</option><option value="true">Yes</option></select>
          </div>
        </div>
        <div class="stack" style="margin-top:12px">
          <button id="check" class="btn">Check</button>
          <span id="eligibility" class="muted"></span>
        </div>
      </section>

      <section class="col-6 card">
        <h3 style="margin:0 0 8px 0">Create return</h3>
        <div class="grid-2">
          <div>
            <label>Order ID</label>
            <input id="orderId" placeholder="ORD-123" />
          </div>
          <div>
            <label>Item ID</label>
            <input id="itemId" placeholder="SKU-456" />
          </div>
          <div>
            <label>Reason</label>
            <select id="reasonId"></select>
          </div>
        </div>
        <div class="stack" style="margin-top:12px">
          <button id="create" class="btn">Create</button>
          <span id="created" class="muted"></span>
        </div>
      </section>

      <section class="col-12 card">
        <div class="stack" style="justify-content: space-between">
          <h3 style="margin:0">Activity</h3>
          <div class="muted">Returns and refunds</div>
        </div>
        <div class="row">
          <div class="col-6">
            <h4 class="muted">Return requests</h4>
            <table id="returns"><thead><tr><th>ID</th><th>Status</th><th>Amount</th><th></th></tr></thead><tbody></tbody></table>
          </div>
          <div class="col-6">
            <h4 class="muted">Refunds</h4>
            <table id="refunds"><thead><tr><th>ID</th><th>Return</th><th>Amount</th></tr></thead><tbody></tbody></table>
          </div>
        </div>
      </section>
    </main>
    <footer>Minimal, dependency-free UI. Fast to load, easy to extend.</footer>

    <script>
      const $ = (id) => document.getElementById(id)
      const fmt = (cents) => (cents == null ? '-' : `$${(cents/100).toFixed(2)}`)
      const todayIso = new Date().toISOString().slice(0,10)
      $('purchasedAt').value = todayIso

      async function getReasons() {
        const res = await fetch('/api/reasons')
        const reasons = await res.json()
        $('reasonId').innerHTML = reasons.map(r => `<option value="${r.id}">${r.label}</option>`).join('')
      }
      getReasons()

      $('check').onclick = async () => {
        const payload = {
          purchasedAt: $('purchasedAt').value,
          isClearance: $('isClearance').value === 'true',
          isOpened: $('isOpened').value === 'true'
        }
        const res = await fetch('/api/eligibility', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) })
        const data = await res.json()
        const msg = data.eligible ? `Eligible under ${data.policy.name}` : `Not eligible` 
        $('eligibility').textContent = msg
        $('eligibility').className = data.eligible ? 'ok' : 'bad'
      }

      $('create').onclick = async () => {
        const payload = {
          orderId: $('orderId').value || 'ORD-001',
          itemId: $('itemId').value || 'SKU-001',
          purchasedAt: $('purchasedAt').value,
          pricePaidCents: Number($('pricePaidCents').value || '0'),
          reasonId: $('reasonId').value,
          isClearance: $('isClearance').value === 'true',
          isOpened: $('isOpened').value === 'true'
        }
        const res = await fetch('/api/returns', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) })
        const data = await res.json()
        if (res.ok) {
          $('created').textContent = data.refund ? `Refunded ${fmt(data.refund.amountCents)}` : `Request ${data.request.status}`
          $('created').className = 'ok'
          refresh()
        } else {
          $('created').textContent = data.error || 'Failed'
          $('created').className = 'bad'
        }
      }

      async function refresh() {
        const [rReq, rRf] = await Promise.all([
          fetch('/api/returns').then(r => r.json()),
          fetch('/api/refunds').then(r => r.json())
        ])
        const returnsTbody = $('returns').querySelector('tbody')
        returnsTbody.innerHTML = rReq.map(rr => {
          const amount = fmt(rr.pricePaidCents)
          const approveBtn = rr.status === 'pending_approval' ? `<button data-id="${rr.id}" class="btn secondary btn-approve">Approve</button>` : ''
          return `<tr><td>${rr.id}</td><td>${rr.status}</td><td>${amount}</td><td>${approveBtn}</td></tr>`
        }).join('')
        returnsTbody.querySelectorAll('.btn-approve').forEach(btn => {
          btn.onclick = async () => {
            const id = btn.getAttribute('data-id')
            const r = await fetch(`/api/returns/${id}/approve`, { method: 'POST' })
            if (r.ok) refresh()
          }
        })

        $('refunds').querySelector('tbody').innerHTML = rRf.map(rf => `<tr><td>${rf.id}</td><td>${rf.returnRequestId}</td><td>${fmt(rf.amountCents)}</td></tr>`).join('')
      }
      $('refresh').onclick = refresh
      refresh()
    </script>
  </body>
  </html>
